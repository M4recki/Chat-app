<!doctype html>
<html lang="en">
  <head>
    {% include "head.html" %}
    <title>Chat app - Create group</title>
  </head>
  <body>
    {% include "navbar.html" %}
    <main>
      <div class="container-fluid justify-content-center">
        <div class="row">
          {% include "sidebar.html" %}
          <section class="ml-sm-auto col-lg-10 px-md-4 py-4 sidebar-page-shell search-users-shell px-3 d-flex flex-column align-items-center">
            <div class="search-users-header text-center">
              <h1 class="sidebar-page-title">Create group chat</h1>
              <p class="lead text-muted sidebar-page-subtitle">Set up a new group conversation.</p>
            </div>
            <div class="card sidebar-list-card search-user-card w-100" style="max-width: 500px;">
              <div class="card-body text-center search-user-card-body">
                <form id="createGroupForm" action="{{ url_for('create_group') }}" method="POST">
                  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                  <input type="hidden" name="member_ids" id="memberIdsInput" value="">
                  <div class="mb-3">
                    <label for="name" class="form-label">Group name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter group name..." required>
                  </div>
                  {% if friends %}
                  <div class="mb-3 text-start">
                    <label class="form-label">Invite friends</label>
                    <div class="list-group">
                      {% for friend in friends %}
                      <label class="list-group-item d-flex align-items-center gap-2">
                        <input type="checkbox" class="form-check-input m-0 member-checkbox" value="{{ friend.id }}">
                        {{ friend.name }} {{ friend.surname }}
                      </label>
                      {% endfor %}
                    </div>
                  </div>
                  {% endif %}
                  <button type="submit" class="btn btn-primary btn-lg text-dark bold w-100">Create group</button>
                </form>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    {% include "footer.html" %}
    <script>
      document.getElementById("createGroupForm").addEventListener("submit", function () {
        const checked = document.querySelectorAll(".member-checkbox:checked");
        const ids = Array.from(checked).map(function (cb) { return cb.value; });
        document.getElementById("memberIdsInput").value = ids.join(",");
      });
    </script>
  </body>
</html>
