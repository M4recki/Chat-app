<!doctype html>
<html lang="en">
  <head>
    {% include "head.html" %}
    <title>Chat app - Forgot Password</title>
  </head>
  <body>
    {% include "navbar.html" %}

    <main>
      <div class="container d-flex align-items-center justify-content-between">
        <div class="col-md-6 px-5 mt-5 text-center">
          <img
            src="{{ url_for('static', path='/img/forgotten password.png') }}"
            alt="girl and boy chatting"
            class="img-fluid rounded main-image mb-3 d-block" />
        </div>
        <div class="col-md-6">
          <h1 class="text-center text-primary main-word pb-5 bold">Forgot Password</h1>
          {% if success %}
          <div class="alert alert-success mt-3" role="alert">
            {{ success }}
          </div>
          {% else %}
          <form action="/forgot_password" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control my-3"
                name="email"
                id="email"
                required />
              {% if errors.email %}
              <div class="alert alert-danger mt-3" role="alert">
                {{ errors.email }}
              </div>
              {% endif %}
            </div>
            <button
                type="submit"
                class="btn btn-lg btn-primary mt-3 bold">
                Send Reset Link
              </button>
            <div class="mt-3 text-center">
              <a href="{{ url_for('login') }}" class="fw-bold text-body text-decoration-none"
                ><i class="bi bi-box-arrow-in-left px-2 text-primary"></i
                ><u class="text-primary">Back to login</u></a
              >
            </div>
          </form>
          {% endif %}
        </div>
      </div>
    </main>

    {% include "footer.html" %}
  </body>
</html>
