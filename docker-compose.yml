version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    # map to a different host port to avoid collisions with local Postgres
    ports:
      - 5433:5432

  web:
    build: .
    # run alembic migrations on startup, then start the app
    command: sh -c "alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker python.main:app --bind 0.0.0.0:8000 --workers 1"
    volumes:
      - .:/app
    ports:
      - 8000:8000
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/chatapp

volumes:
  pgdata:
